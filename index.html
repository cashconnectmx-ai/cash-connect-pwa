<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cash Connect</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="theme-color" content="#003366">
  
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #003366; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbxeE79ruPienKv5j_L8ilxZQzfUx50OSbtRv1XufucU/exec" allow="camera; microphone; fullscreen"></iframe>

  <script>
    // Registrar el Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registrado', reg))
          .catch(err => console.error('Error al registrar Service Worker', err));
      });
    }
  </script>
</body>
</html>
